name: ARM CI Extended
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  build:
    if: ${{ false }}
    runs-on:
    - self-hosted
    - linux
    - ARM64
    strategy:
      fail-fast: false
      matrix:
        pyver:
        - '3.9'
        - '3.10'
        - '3.11'
        - '3.12'
    steps:
    - name: Stop old running containers (if any)
      shell: bash
      run: "running_containers=$(docker ps -q) && \\\nif [[ $running_containers == \"\" ]]; then\n  echo \"No running containers\";\nelse\n  echo \"Running container(s) found\" && \\\n  docker stop $running_containers;\nfi\ndocker container prune -f\ndocker image prune -af\n"
    - name: Clean repository
      shell: bash
      run: find /home/ubuntu/actions-runner/_work/tensorflow/tensorflow/. -name . -o -prune -exec sudo rm -rf -- {} + || true
    - name: Checkout repository for nightly (skipped for releases)
      if: ${{ github.event_name == 'schedule' }}
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
      with:
        ref: nightly
    - name: Checkout repository
      if: ${{ github.event_name == 'push' }}
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - name: Build binary and run python tests on nightly for all python versions
      shell: bash
      run: 'is_nightly=0 && tf_project_name=''tf_ci_ext'' && ${{ github.event_name == ''schedule'' }} && is_nightly=1 && tf_project_name=''tf_nightly_ci_ext''

        CI_DOCKER_BUILD_EXTRA_PARAMS="--build-arg py_major_minor_version=${{ matrix.pyver }} --build-arg is_nightly=${is_nightly} --build-arg tf_project_name=${tf_project_name}" \

        ./tensorflow/tools/ci_build/ci_build.sh cpu.arm64 bash tensorflow/tools/ci_build/rel/ubuntu/cpu_arm64_test.sh

        '
