name: ARM CI
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  build:
    if: github.repository == 'tensorflow/tensorflow' && (github.event.action != 'labeled' || (github.event.action == 'labeled' && github.event.label.name == 'kokoro:force-run'))
    runs-on:
    - self-hosted
    - linux
    - ARM64
    strategy:
      matrix:
        pyver:
        - '3.10'
    steps:
    - name: Stop old running containers (if any)
      shell: bash
      run: "running_containers=$(docker ps -q) && \\\nif [[ $running_containers == \"\" ]]; then\n  echo \"No running containers\";\nelse\n  echo \"Running container(s) found\" && \\\n  docker stop $running_containers;\nfi\ndocker container prune -f\n"
    - name: Clean repository
      shell: bash
      run: find /home/ubuntu/actions-runner/_work/tensorflow/tensorflow/. -name . -o -prune -exec sudo rm -rf -- {} + || true
    - name: Checkout repository
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - name: Build binary and run python tests
      shell: bash
      run: 'CI_DOCKER_BUILD_EXTRA_PARAMS="--pull --build-arg py_major_minor_version=${{ matrix.pyver }} --build-arg is_nightly=1 --build-arg tf_project_name=tf_nightly_ci" \

        ./tensorflow/tools/ci_build/ci_build.sh cpu.arm64 bash tensorflow/tools/ci_build/rel/ubuntu/cpu_arm64_test.sh

        '
