name: Close inactive issues
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  close-issues:
    if: github.repository == 'tensorflow/tensorflow'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - name: Awaiting response issues
      uses: actions/stale@997185467fa4f803885201cee163a9f38240193d
      with:
        exempt-issue-labels: override-stale
        exempt-pr-labels: override-stale
        operations-per-run: 1000
        days-before-issue-stale: 7
        days-before-issue-close: 7
        stale-issue-label: stale
        close-issue-reason: completed
        labels-to-remove-when-unstale: stat:awaiting response
        only-labels: stat:awaiting response
        stale-issue-message: 'This issue is stale because it has been open for 7 days with no activity. It will be closed if no further activity occurs. Thank you.

          '
        close-issue-message: 'This issue was closed because it has been inactive for 7 days since being marked as stale. Please reopen if you''d like to work on this further.

          '
        days-before-pr-stale: 14
        days-before-pr-close: 14
        stale-pr-message: This PR is stale because it has been open for 14 days with no activity. It will be closed if no further activity occurs. Thank you.
        close-pr-message: This PR was closed because it has been inactive for 14 days since being marked as stale. Please reopen if you'd like to work on this further.
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Contribution issues
      uses: actions/stale@997185467fa4f803885201cee163a9f38240193d
      with:
        exempt-issue-labels: override-stale
        exempt-pr-labels: override-stale
        operations-per-run: 1000
        days-before-issue-stale: 180
        days-before-issue-close: 365
        stale-issue-label: stale
        close-issue-reason: completed
        labels-to-remove-when-unstale: stat:contribution welcome,stat:good first issue
        any-of-labels: stat:contribution welcome,stat:good first issue
        stale-issue-message: 'This issue is stale because it has been open for 180 days with no activity. It will be closed if no further activity occurs. Thank you.

          '
        close-issue-message: 'This issue was closed because it has been inactive for 1 year.

          '
        repo-token: ${{ secrets.GITHUB_TOKEN }}
