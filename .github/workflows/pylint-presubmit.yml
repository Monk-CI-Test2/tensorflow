name: PyLint
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  build:
    name: PyLint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
    - name: Get file changes
      id: get_file_changes
      uses: trilom/file-changes-action@a6ca26c14274c33b15e6499323aac178af06ad4b
      with:
        output: ' '
    - name: Report list of changed files
      run: 'echo Changed files: ${{ steps.get_file_changes.outputs.files }}

        '
    - name: Set up Python 3.9
      uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
      with:
        python-version: '3.9'
    - name: Install Python dependencies
      run: 'python -m pip install --upgrade pip

        pip install pylint==2.13.9 numpy wheel

        '
    - name: Run PyLint on changed files
      run: 'echo "${{ steps.get_file_changes.outputs.files}}" | tr " " "\n" | grep ".py$" | xargs pylint --rcfile=tensorflow/tools/ci_build/pylintrc

        '
